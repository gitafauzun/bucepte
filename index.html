<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="style.css?v=1.1">
</head>
<body>

    <header class="site-header">
        <nav class="nav-container">
            <a href="index.html" class="logo">
                <img src="logosiyah.png" alt="BuCepte Logo" style="height: 35px; object-fit: contain;">
            </a>
            <div class="nav-links" style="display: flex; gap: 20px; align-items: center;">
                <a href="https://link.dolap.com/rwtwfl" target="_blank" style="text-decoration: none; color: #007bff; font-weight: 600;">Dolap E-Mağaza</a>
                <a href="index.html">Anasayfa</a>
                <a href="hakkimizda.html">Hakkımızda</a>
            </div>
        </nav>
    </header>

    <main class="container">
        <section class="hero">
            <h1>Bucepte.com</h1>
            <p>Şık Kılıflar, Kaliteli Ekran Koruyucular ve Premium Elektronik Ürünler</p>
        </section>

        <!-- Arama Alanı -->
        <div class="search-container">
            <div class="search-box">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="searchInput" placeholder="Ürün ara (Örn: 14 Pro Kılıf)...">
                <button id="searchButton" class="search-btn">Ara</button>
            </div>
        </div>

        <div id="kategori-menusu" class="dropdown-container"></div>

        <div id="urun-vitrini" class="grid-layout">
            <!-- Ürünler JavaScript ile buraya yüklenecek -->
        </div>
    </main>

    <div id="urun-detay-modal" class="modal">
        <div class="modal-content" id="modal-detay-alani"></div>
    </div>

    <!-- Sosyal Medya ve Alt Bilgi (Footer) Alanı -->
    <footer class="site-footer">
        <div class="footer-content" style="max-width: 1100px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px;">
            <div class="footer-logo" style="display: flex; align-items: center; gap: 15px; font-size: 13px; color: #6e6e73;">
                <img src="logosiyah.png" alt="BuCepte Logo" style="height: 25px; object-fit: contain;">
                <span>© 2026 BuCepte. Tüm hakları saklıdır.</span>
            </div>
            
            <div class="social-links" style="display: flex; gap: 12px;">
                <!-- Instagram -->
                <a href="https://instagram.com/buceptecom" target="_blank" aria-label="Instagram" class="social-icon">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>

                <!-- WhatsApp İletişim -->
                <a href="https://wa.me/905319813938" target="_blank" aria-label="WhatsApp" class="social-icon">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
                </a>
             
            </div>
        </div>

    <script src="app.js"></script>
