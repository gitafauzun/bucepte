
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Profilim - bucepte.com</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="max-width: 600px; padding-top: 50px;">
        <h2 style="text-align: center;">👤 Kullanıcı Profilin</h2>
        <div class="hakkimizda-kart" style="margin-top: 20px;">
            <h3>Hoş geldin!</h3>
            <p style="margin: 15px 0;">Buradan siparişlerini takip edebilir ve hesap bilgilerini düzenleyebilirsin.</p>
            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <a href="#" class="satin-al-btn" style="background: #eee; color: #333;">📦 Siparişlerim</a>
                <a href="#" class="satin-al-btn" style="background: #eee; color: #333;">⚙️ Hesap Ayarları</a>
                <a href="index.html" class="satin-al-btn" style="background: #CF0606; color: white;">Çıkış Yap</a>
            </div>
        </div>
    </div>
        <script type="module">
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
    
    const auth = getAuth();
    
    // Sayfa yüklendiğinde kullanıcının giriş yapıp yapmadığını kontrol et
    onAuthStateChanged(auth, (user) => {
        if (user) {
            // Eğer giriş yapmışsa e-postasını alana yaz
            const emailField = document.getElementById('email-field');
            if(emailField) emailField.value = user.email;
        } else {
            // Giriş yapmamışsa login sayfasına at
            window.location.href = "login.html";
        }
    });
</script>
    
</body>
</html>
