<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Hesap Ayarları - bucepte.com</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="padding-top: 50px;">
        <h2 style="text-align: center;">⚙️ Hesap Ayarları</h2>
        <div class="hakkimizda-kart" style="margin-top: 20px;">
            <label>E-posta Adresin:</label>
            <input type="email" id="email-field" class="arama-input" style="width: 100%; margin: 10px 0;" disabled>
            
            <label>Yeni Şifre:</label>
            <input type="password" id="new-password" placeholder="Yeni şifreni gir..." class="arama-input" style="width: 100%; margin: 10px 0;">
            
            <button id="update-btn" class="satin-al-btn" style="width: 100%;">Değişiklikleri Kaydet</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, updatePassword } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyARzZZuHOHe_kqOhqbPeIJDh5xTj1XtoGc",
            authDomain: "bucepte-app.firebaseapp.com",
            projectId: "bucepte-app",
            storageBucket: "bucepte-app.firebasestorage.app",
            messagingSenderId: "762991517276",
            appId: "1:762991517276:web:72bd254af63b45c8241099",
            measurementId: "G-Q7D83GT748"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('email-field').value = user.email;
            } else {
                window.location.href = "login.html";
            }
        });

        // Şifre Güncelleme Fonksiyonu
        document.getElementById('update-btn').addEventListener('click', () => {
            const user = auth.currentUser;
            const newPassword = document.getElementById('new-password').value;

            if (newPassword.length < 6) {
                alert("Şifreniz en az 6 karakter olmalıdır!");
                return;
            }

            updatePassword(user, newPassword).then(() => {
                alert("Şifreniz başarıyla güncellendi!");
                document.getElementById('new-password').value = "";
            }).catch((error) => {
                alert("Hata: " + error.message);
            });
        });
    </script>
</body>
</html>
