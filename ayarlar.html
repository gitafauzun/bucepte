
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Hesap Ayarları - bucepte.com</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="padding-top: 50px;">
        <h2 style="text-align: center;">⚙️ Hesap Ayarları</h2>
        <div class="hakkimizda-kart" style="margin-top: 20px;">
            <label>E-posta Adresin:</label>
            <input type="email" id="email-field" class="arama-input" style="width: 100%; margin: 10px 0;" disabled>
            
            <label>Yeni Şifre:</label>
            <input type="password" id="new-password" placeholder="Yeni şifreni gir..." class="arama-input" style="width: 100%; margin: 10px 0;">
            
            <button id="update-btn" class="satin-al-btn" style="width: 100%;">Değişiklikleri Kaydet</button>
        </div>
    </div>
    <script type="module">
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
    
    const auth = getAuth();
    
    // Sayfa yüklendiğinde kullanıcının giriş yapıp yapmadığını kontrol et
    onAuthStateChanged(auth, (user) => {
        if (user) {
            // Eğer giriş yapmışsa e-postasını alana yaz
            const emailField = document.getElementById('email-field');
            if(emailField) emailField.value = user.email;
        } else {
            // Giriş yapmamışsa login sayfasına at
            window.location.href = "login.html";
        }
    });
</script>
</body>
</html>
