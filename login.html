
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Giriş Yap - bucepte.com</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-box { max-width: 400px; margin: 100px auto; padding: 40px; background: #fff; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .input-field { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2 style="text-align: center; margin-bottom: 20px;">Giriş Yap</h2>
        <input type="email" placeholder="E-posta" class="input-field">
        <input type="password" placeholder="Şifre" class="input-field">
        <button class="satin-al-btn" style="width: 100%; margin-top: 20px;">Giriş Yap</button>
        <p style="text-align: center; margin-top: 20px;">Hesabın yok mu? <a href="#">Kayıt Ol</a></p>
    </div>
</body>
</html>
