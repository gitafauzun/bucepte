
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Siparişlerim - bucepte.com</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="padding-top: 50px;">
        <h2 style="text-align: center;">📦 Siparişlerim</h2>
        <div class="hakkimizda-kart" style="margin-top: 20px;">
            <p style="text-align: center; color: var(--gri-metin);">Henüz bir siparişin bulunmuyor.</p>
            <a href="index.html" class="satin-al-btn" style="margin-top: 20px;">Alışverişe Başla</a>
        </div>
    </div>
    <script type="module">
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
    
    const auth = getAuth();
    
    // Sayfa yüklendiğinde kullanıcının giriş yapıp yapmadığını kontrol et
    onAuthStateChanged(auth, (user) => {
        if (user) {
            // Eğer giriş yapmışsa e-postasını alana yaz
            const emailField = document.getElementById('email-field');
            if(emailField) emailField.value = user.email;
        } else {
            // Giriş yapmamışsa login sayfasına at
            window.location.href = "login.html";
        }
    });
</script>
    
</body>
</html>
