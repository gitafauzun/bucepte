<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Siparişlerim - bucepte.com</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="padding-top: 50px;">
        <h2 style="text-align: center;">📦 Siparişlerim</h2>
        <div class="hakkimizda-kart" style="margin-top: 20px;">
            <p style="text-align: center; color: var(--gri-metin);">Henüz bir siparişin bulunmuyor.</p>
            <a href="index.html" class="satin-al-btn" style="text-decoration:none; display:block; text-align:center; padding:10px;">Alışverişe Başla</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyARzZZuHOHe_kqOhqbPeIJDh5xTj1XtoGc",
            authDomain: "bucepte-app.firebaseapp.com",
            projectId: "bucepte-app",
            storageBucket: "bucepte-app.firebasestorage.app",
            messagingSenderId: "762991517276",
            appId: "1:762991517276:web:72bd254af63b45c8241099",
            measurementId: "G-Q7D83GT748"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        
        // Kullanıcı giriş yapmadıysa login sayfasına gönder
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "login.html";
            }
        });
    </script>
</body>
</html>
